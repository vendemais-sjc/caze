        .notification-top {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;

            z-index: 30;
            pointer-events: none;
            transition: opacity 0.3s;
            opacity: 0;

            padding: 8px 20px;
            font-size: 0.85rem;
            color: #fff;
            border-left: 3px solid var(--primary-color);

        .menu-button {

        .menu-popup {

            padding: 10px;

            pointer-events: auto;

            align-items: center;

        .menu-popup button:active { background: var(--primary-color); color: #000; }
        .menu-popup i { width: 24px; text-align: center; }
        
        .genre-button {
            position: absolute;
            bottom: 120px;
            right: 15px;
            background: linear-gradient(135deg, #FF512F, #DD2475);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

        @keyframes pulse-genre { 0% { transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.4); } 50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,81,47,0.6); } 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.4); } }
        .genre-button:active { transform: scale(0.9); animation: none; }
        
        /* MODAL COM FUNDO BRANCO/CLARO - MAIS VISÍVEL */
        .genres-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 30px 30px 0 0;
            padding: 25px 20px 30px;

        .genres-modal.open { transform: translateY(0); }

        .genres-grid {

            gap: 15px;
            margin-bottom: 20px;
        }
        
        /* CARDS COM CORES FORTES E CONTRASTE */
        .genre-card {
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);

        .progress-area { margin-bottom: 8px; }
        .progress-time { display: flex; justify-content: space-between; font-size: 0.7rem; color: #ccc; margin-bottom: 4px; }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.3); cursor: pointer; border-radius: 3px; }
        .progress-fill { height: 100%; background: #e63946; width: 0%; border-radius: 3px; box-shadow: 0 0 5px #e63946; }
        .control-buttons { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .control-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1.2rem; width: 44px; height: 44px; cursor: pointer; border-radius: 50%; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .control-btn:active { transform: scale(0.9); background: #e63946; color: #000; }
        .play-btn { font-size: 1.6rem; width: 54px; height: 54px; background: #e63946; color: #000; border: none; }
        
        .feedback-modal {

            right: 20px;

        .rating { display: flex; gap: 6px; margin: 8px 0; justify-content: center; }

        .star.active, .star.fas { color: #ffd700; }
        .feedback-modal textarea { width: 100%; height: 60px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 8px; color: #fff; margin-bottom: 8px; resize: none; }

        .modal-btn.send { background: #25D366; color: #000; font-weight: bold; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        #splash.hidden { opacity: 0; pointer-events: none; }

        #tap-to-start {

        .genre-badge {

            color: white;
            z-index: 31;
            pointer-events: none;
            border-left: 3px solid #e63946;
            font-weight: bold;
        }
    </style>
</head>

            if (genero === "TODOS") {
                filteredPlaylist = [...musicas];

        let silentSourceNode = null;
        let musicSourceNode = null;
        let adSourceNode = null;
        let musicGain = null;
        let adGain = null;
        let audioActive = false;
        let keepAliveInterval = null;
        
        async function initAudioContext() {
            if (audioActive && audioCtx && audioCtx.state === 'running') return true;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                
                const sampleRate = audioCtx.sampleRate;
                const bufferLen = sampleRate * 4;
                const silentBuffer = audioCtx.createBuffer(1, bufferLen, sampleRate);
                const data = silentBuffer.getChannelData(0);
                for (let i = 0; i < bufferLen; i++) data[i] = 0;
                
                if (silentSourceNode) {
                    try { silentSourceNode.stop(); silentSourceNode.disconnect(); } catch(e) {}
                }
                silentSourceNode = audioCtx.createBufferSource();
                silentSourceNode.buffer = silentBuffer;
                silentSourceNode.loop = true;
                silentSourceNode.connect(audioCtx.destination);
                silentSourceNode.start();
                
                if (musicSourceNode) {
                    try { musicSourceNode.disconnect(); } catch(e) {}
                    musicSourceNode = null;
                }
                musicSourceNode = audioCtx.createMediaElementSource(musicPlayer);
                musicGain = audioCtx.createGain();
                musicGain.gain.value = 0.9;
                musicSourceNode.connect(musicGain);
                musicGain.connect(audioCtx.destination);
                
                if (adSourceNode) {
                    try { adSourceNode.disconnect(); } catch(e) {}
                }
                adSourceNode = audioCtx.createMediaElementSource(adPlayer);
                adGain = audioCtx.createGain();
                adGain.gain.value = 0.9;
                adSourceNode.connect(adGain);
                adGain.connect(audioCtx.destination);
                
                audioActive = true;
                return true;
            } catch (err) {
                showNotification('❌ Erro ao ativar áudio. Toque novamente.', 3000);
                return false;
            }
        }
        
        function startKeepAliveService() {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(async () => {
                if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                if (isPlaying && !isAdPlaying && musicPlayer.paused && audioActive) {
                    await musicPlayer.play().catch(e => console.log);
                }
            }, 4000);
        }
        
        function formatTime(sec) { if (isNaN(sec)) return "0:00"; const m = Math.floor(sec / 60), s = Math.floor(sec % 60); return `${m}:${s<10?'0':''}${s}`; }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; }
        function startTimer() { stopTimer(); timerInterval = setInterval(() => { if (isPlaying && !isAdPlaying && musicPlayer.duration && !musicPlayer.paused) { progressFill.style.width = (musicPlayer.currentTime/musicPlayer.duration)*100+'%'; currentTimeEl.textContent = formatTime(musicPlayer.currentTime); } }, 200); }
        
        async function playMusic() {
            if (!audioActive) { showNotification('⚠️ Clique no botão "ATIVAR ÁUDIO" primeiro!', 3000); return false; }
            if (isAdPlaying) { showNotification('Aguarde o anúncio terminar', 2000); return false; }
            const track = filteredPlaylist[currentIndex];
            if (!track || !track.src) return false;
            musicPlayer.pause();
            musicPlayer.src = track.src;
            musicPlayer.load();
            updateGenreBadge(track.genero);
            
            return new Promise((resolve) => {
                musicPlayer.oncanplaythrough = async () => {
                    try {
                        if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                        await musicPlayer.play();
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        startTimer();
                        if (musicPlayer.duration) totalTimeEl.textContent = formatTime(musicPlayer.duration);
                        else musicPlayer.addEventListener('loadedmetadata', () => { totalTimeEl.textContent = formatTime(musicPlayer.duration); }, { once: true });
                        splash.classList.add('hidden'); setTimeout(() => splash.style.display = 'none', 500);
                        tapToStart.style.display = 'none';
                        resolve(true);
                    } catch(e) { isPlaying = false; playBtn.innerHTML = '<i class="fas fa-play"></i>'; resolve(false); }
                };
                musicPlayer.onended = () => {
                    stopTimer();
                    let nextFiltered = shuffle ? Math.floor(Math.random() * filteredPlaylist.length) : (currentIndex + 1) % filteredPlaylist.length;
                    currentIndex = nextFiltered;
                    loadTrackUI(currentIndex);
                    setTimeout(async () => { if (!isAdPlaying) await playMusic(); }, 80);
                };
                musicPlayer.onerror = () => { showNotification(`⚠️ Erro: ${track.title}`, 3000); setTimeout(() => { if (!isAdPlaying) nextTrack(); }, 1000); resolve(false); };
            });
        }
        
        function pauseMusic() { musicPlayer.pause(); isPlaying = false; playBtn.innerHTML = '<i class="fas fa-play"></i>'; stopTimer(); }
        function togglePlayPause() { isPlaying ? pauseMusic() : playMusic(); }
        function loadTrackUI(index) { if (index >= filteredPlaylist.length) index = 0; const t = filteredPlaylist[index]; currentIndex = index; trackArtist.textContent = `${t.title} - ${t.artist} [${t.genero}]`; currentTimeEl.textContent = '0:00'; totalTimeEl.textContent = '0:00'; progressFill.style.width = '0%'; updateGenreBadge(t.genero); }
        
        async function nextTrack() { if (isAdPlaying) return; stopTimer(); let next = shuffle ? Math.floor(Math.random() * filteredPlaylist.length) : (currentIndex + 1) % filteredPlaylist.length; currentIndex = next; loadTrackUI(currentIndex); if (isPlaying) await playMusic(); }
        async function prevTrack() { if (isAdPlaying) return; stopTimer(); let prev = shuffle ? Math.floor(Math.random() * filteredPlaylist.length) : (currentIndex - 1 + filteredPlaylist.length) % filteredPlaylist.length; currentIndex = prev; loadTrackUI(currentIndex); if (isPlaying) await playMusic(); }
        
        // Eventos
        document.getElementById('progressBar').addEventListener('click', (e) => { if(isAdPlaying) return; const rect = e.currentTarget.getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; if(musicPlayer.duration) musicPlayer.currentTime = percent * musicPlayer.duration; resetHideTimer(); });
        playBtn.addEventListener('click', () => { if(!audioActive) showNotification('⚠️ Clique no botão "ATIVAR ÁUDIO" primeiro!', 3000); else togglePlayPause(); resetHideTimer(); });
        prevBtn.addEventListener('click', () => { prevTrack(); resetHideTimer(); });
        nextBtn.addEventListener('click', () => { nextTrack(); resetHideTimer(); });
        shuffleBtn.addEventListener('click', () => { shuffle = !shuffle; showNotification(shuffle ? '🔀 Aleatório ON' : '➡️ Sequencial', 1500); resetHideTimer(); });
        
        // Menu
        function toggleMenu() { menuPopup.classList.toggle('open'); }
        function closeMenu() { menuPopup.classList.remove('open'); }
        menuButton.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
        document.addEventListener('click', (e) => { if (!menuButton.contains(e.target) && !menuPopup.contains(e.target)) closeMenu(); });
        document.getElementById('fullscreenMenuBtn').addEventListener('click', () => { document.documentElement.requestFullscreen(); closeMenu(); });
        document.getElementById('shareMenuBtn').addEventListener('click', () => { navigator.share ? navigator.share({ title: 'MUTV Playlist' }) : navigator.clipboard.writeText(location.href); closeMenu(); });
        document.getElementById('feedbackMenuBtn').addEventListener('click', () => { document.getElementById('feedbackModal').classList.toggle('open'); closeMenu(); });
        
        // Feedback
        let currentRating = 0;
        document.querySelectorAll('#ratingStars .star').forEach(star => { star.addEventListener('click', () => { currentRating = parseInt(star.dataset.rating); document.querySelectorAll('#ratingStars .star').forEach((s,i) => { if(i < currentRating) { s.classList.add('fas','active'); s.classList.remove('far'); } else { s.classList.remove('fas','active'); s.classList.add('far'); } }); }); });
        document.getElementById('cancelFeedback').addEventListener('click', () => { document.getElementById('feedbackModal').classList.remove('open'); document.getElementById('feedbackText').value = ''; currentRating = 0; document.querySelectorAll('#ratingStars .star').forEach(s => { s.classList.remove('fas','active'); s.classList.add('far'); }); });
        document.getElementById('sendFeedback').addEventListener('click', () => { if(currentRating === 0) { showNotification('⭐ Selecione uma nota', 2000); return; } let msg = `🎵 *MUTV Playlist*\n⭐ Nota: ${'★'.repeat(currentRating)}${'☆'.repeat(5-currentRating)}\n`; if(document.getElementById('feedbackText').value.trim()) msg += `💬 ${document.getElementById('feedbackText').value.trim()}\n`; window.open(`https://wa.me/5512988461978?text=${encodeURIComponent(msg)}`, '_blank'); showNotification('✅ WhatsApp aberto!', 2000); document.getElementById('feedbackModal').classList.remove('open'); document.getElementById('feedbackText').value = ''; currentRating = 0; document.querySelectorAll('#ratingStars .star').forEach(s => { s.classList.remove('fas','active'); s.classList.add('far'); }); });
        
        // Vídeos
        let currentVideoIndex = 0;
        const ctaBtn = document.getElementById('ctaButton');
        function updateVideoAndButton(index) {
            const video = videosList[index];
            const vidEl = document.getElementById('mainVideo');
            if (vidEl) { vidEl.pause(); vidEl.src = video.src; vidEl.load(); vidEl.play().catch(e => console.log); ctaBtn.innerHTML = `<i class="fas ${video.icone}"></i> ${video.botaoTexto}`; ctaBtn.onclick = () => window.open(video.link, '_blank'); }
        }
        updateVideoAndButton(0);
        setInterval(() => { currentVideoIndex = (currentVideoIndex + 1) % videosList.length; updateVideoAndButton(currentVideoIndex); }, 20000);
        
        // Auto-hide
        const bottomControls = document.getElementById('bottomControls');
        let hideTimeout;
        function showControls() { bottomControls.classList.remove('hide'); clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); }
        function resetHideTimer() { if (bottomControls.classList.contains('hide')) showControls(); else { clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); } }
        document.addEventListener('touchstart', resetHideTimer);
        document.addEventListener('click', resetHideTimer);
        showControls();
        
        // Inicialização
        tapToStart.addEventListener('click', async (e) => {
            e.stopPropagation();
            const ok = await initAudioContext();
            if(ok) {
                startKeepAliveService();
                loadTrackUI(0);
                await playMusic();
                tapToStart.style.display = 'none';
                try { await document.documentElement.requestFullscreen(); } catch(err) {}
            }
        });
        
        window.addEventListener('load', () => {
            loadTrackUI(0);
            tapToStart.style.display = 'block';
        });
    </script>
</body>
</html>
