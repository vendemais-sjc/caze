        @media (max-width: 480px) {

        }
    </style>
</head>

    <script>
        // PLAYLIST POR GÊNERO
        const musicas = [
            { id: 1, title: "Ficar por Ficar", artist: "Zé Vaqueiro", src: "Zé-Vaqueiro-Ficar-por-Ficar.m4a", genre: "sertanejo" },
            { id: 2, title: "Coração Partido", artist: "Luan Estilizado", src: "16 - Coracao Partido - Luan Estilizado.mp3", genre: "sertanejo" },
            { id: 3, title: "Porsche Azul", artist: "Cláudio Ney", src: "Claudio_Ney_e_Juliana_Porsche_Azul_.m4a", genre: "sertanejo" },
            { id: 4, title: "Xote da Alegria", artist: "Forró do Bom", src: "Zé-Vaqueiro-Ficar-por-Ficar.m4a", genre: "forro" },
            { id: 5, title: "Forró de Verdade", artist: "Banda Forró", src: "16 - Coracao Partido - Luan Estilizado.mp3", genre: "forro" },
            { id: 6, title: "Sanfona Sentimental", artist: "Forró das Antigas", src: "Claudio_Ney_e_Juliana_Porsche_Azul_.m4a", genre: "forro" },
            { id: 7, title: "Samba de Roda", artist: "Grupo Samba", src: "Zé-Vaqueiro-Ficar-por-Ficar.m4a", genre: "samba" },
            { id: 8, title: "Pagode do Bom", artist: "Pagodeiros", src: "16 - Coracao Partido - Luan Estilizado.mp3", genre: "samba" },
            { id: 9, title: "Cidade do Samba", artist: "Samba Brasil", src: "Claudio_Ney_e_Juliana_Porsche_Azul_.m4a", genre: "samba" },
            { id: 10, title: "8bit Journey", artist: "ChipTune", src: "Zé-Vaqueiro-Ficar-por-Ficar.m4a", genre: "vgm" },
            { id: 11, title: "Retro Gauntlet", artist: "PixelSound", src: "16 - Coracao Partido - Luan Estilizado.mp3", genre: "vgm" },
            { id: 12, title: "Final Stage", artist: "VGM Orchestra", src: "Claudio_Ney_e_Juliana_Porsche_Azul_.m4a", genre: "vgm" }
        ];
        
        const videosList = [
            { src: "play.mp4", nome: "Destaque", link: "https://wa.me/5512988461978?text=Olá,%20quero%20um%20orçamento!", botaoTexto: "💰 ORÇAMENTO", icone: "fas fa-file-invoice-dollar" }
        ];
        
        let currentGenre = "sertanejo";
        let filteredPlaylist = musicas.filter(m => m.genre === currentGenre);
        let currentIndex = 0, isPlaying = false, shuffle = false;
        let audioActive = false, audioCtx = null, silentSourceNode = null, musicSourceNode = null, musicGain = null, keepAliveInterval = null;
        let timerInterval = null;
        
        // DOM
        const musicPlayer = document.getElementById('musicPlayer');
        const playBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const trackArtist = document.getElementById('trackArtist');
        const splash = document.getElementById('splash');
        const tapToStart = document.getElementById('tap-to-start');
        const menuButton = document.getElementById('menuButton');
        const menuPopup = document.getElementById('menuPopup');
        const notificationTop = document.getElementById('notificationTop');
        const notificationMessage = document.getElementById('notificationMessage');
        const genreButtons = document.querySelectorAll('.genre-btn');
        const ctaBtn = document.getElementById('ctaButton');
        
        function showNotification(msg, duration = 3000) {
            if (window.notifTimeout) clearTimeout(window.notifTimeout);
            notificationMessage.innerText = msg;
            notificationTop.classList.add('show');
            window.notifTimeout = setTimeout(() => notificationTop.classList.remove('show'), duration);
        }
        
        function changeGenre(genre) {
            if (genre === currentGenre) return;
            currentGenre = genre;
            filteredPlaylist = musicas.filter(m => m.genre === currentGenre);
            if (filteredPlaylist.length === 0) return;
            
            genreButtons.forEach(btn => {
                if (btn.dataset.genre === genre) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            currentIndex = 0;
            loadTrackUI(currentIndex);
            let genreName = { sertanejo: "Sertanejo", forro: "Forró", samba: "Samba", vgm: "VGM" }[genre];
            showNotification(`🎵 ${genreName} ativado`, 1500);
            if (isPlaying && audioActive) playMusic();
        }
        
        function formatTime(sec) { if (isNaN(sec)) return "0:00"; const m = Math.floor(sec / 60), s = Math.floor(sec % 60); return `${m}:${s<10?'0':''}${s}`; }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; }
        function startTimer() { stopTimer(); timerInterval = setInterval(() => { if (isPlaying && musicPlayer.duration && !musicPlayer.paused) { progressFill.style.width = (musicPlayer.currentTime/musicPlayer.duration)*100+'%'; currentTimeEl.textContent = formatTime(musicPlayer.currentTime); } }, 200); }
        
        function loadTrackUI(index) {
            if (index >= filteredPlaylist.length) index = 0;
            if (index < 0) index = filteredPlaylist.length - 1;
            currentIndex = index;
            const t = filteredPlaylist[currentIndex];
            if (t) {
                let generoDisplay = { sertanejo: "Sertanejo", forro: "Forró", samba: "Samba", vgm: "VGM" }[t.genre];
                trackArtist.textContent = `${t.title} - ${t.artist} • ${generoDisplay}`;
                currentTimeEl.textContent = '0:00';
                totalTimeEl.textContent = '0:00';
                progressFill.style.width = '0%';
            }
        }
        
        async function playMusic() {
            if (!audioActive) { showNotification('⚠️ Clique em ATIVAR ÁUDIO primeiro!', 2500); return false; }
            if (filteredPlaylist.length === 0) return false;
            const track = filteredPlaylist[currentIndex];
            if (!track || !track.src) return false;
            musicPlayer.pause();
            musicPlayer.src = track.src;
            musicPlayer.load();
            return new Promise((resolve) => {
                musicPlayer.oncanplaythrough = async () => {
                    try {
                        if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                        await musicPlayer.play();
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        startTimer();
                        if (musicPlayer.duration) totalTimeEl.textContent = formatTime(musicPlayer.duration);
                        else musicPlayer.addEventListener('loadedmetadata', () => { totalTimeEl.textContent = formatTime(musicPlayer.duration); }, { once: true });
                        splash.classList.add('hidden'); setTimeout(() => splash.style.display = 'none', 500);
                        tapToStart.style.display = 'none';
                        resolve(true);
                    } catch(e) { isPlaying = false; playBtn.innerHTML = '<i class="fas fa-play"></i>'; resolve(false); }
                };
                musicPlayer.onended = () => {
                    stopTimer();
                    let nextFiltered;
                    if (shuffle && filteredPlaylist.length > 1) {
                        do { nextFiltered = Math.floor(Math.random() * filteredPlaylist.length); } while (nextFiltered === currentIndex);
                    } else { nextFiltered = (currentIndex + 1) % filteredPlaylist.length; }
                    currentIndex = nextFiltered;
                    loadTrackUI(currentIndex);
                    setTimeout(async () => { if (isPlaying) await playMusic(); }, 80);
                };
                musicPlayer.ontimeupdate = () => { if (musicPlayer.duration) { progressFill.style.width = (musicPlayer.currentTime/musicPlayer.duration)*100+'%'; currentTimeEl.textContent = formatTime(musicPlayer.currentTime); } };
            });
        }
        
        function pauseMusic() { musicPlayer.pause(); isPlaying = false; playBtn.innerHTML = '<i class="fas fa-play"></i>'; stopTimer(); }
        function togglePlayPause() { isPlaying ? pauseMusic() : playMusic(); }
        async function nextTrack() { stopTimer(); let n; if (shuffle && filteredPlaylist.length > 1) { do { n = Math.floor(Math.random() * filteredPlaylist.length); } while (n === currentIndex); } else { n = (currentIndex + 1) % filteredPlaylist.length; } currentIndex = n; loadTrackUI(currentIndex); if (isPlaying) await playMusic(); }
        async function prevTrack() { stopTimer(); let n; if (shuffle && filteredPlaylist.length > 1) { do { n = Math.floor(Math.random() * filteredPlaylist.length); } while (n === currentIndex); } else { n = (currentIndex - 1 + filteredPlaylist.length) % filteredPlaylist.length; } currentIndex = n; loadTrackUI(currentIndex); if (isPlaying) await playMusic(); }
        
        async function initAudioContext() {
            if (audioActive && audioCtx && audioCtx.state === 'running') return true;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                const sampleRate = audioCtx.sampleRate;
                const bufferLen = sampleRate * 4;
                const silentBuffer = audioCtx.createBuffer(1, bufferLen, sampleRate);
                for (let i = 0; i < bufferLen; i++) silentBuffer.getChannelData(0)[i] = 0;
                if (silentSourceNode) { try { silentSourceNode.stop(); silentSourceNode.disconnect(); } catch(e) {} }
                silentSourceNode = audioCtx.createBufferSource();
                silentSourceNode.buffer = silentBuffer;
                silentSourceNode.loop = true;
                silentSourceNode.connect(audioCtx.destination);
                silentSourceNode.start();
                if (musicSourceNode) { try { musicSourceNode.disconnect(); } catch(e) {} }
                musicSourceNode = audioCtx.createMediaElementSource(musicPlayer);
                musicGain = audioCtx.createGain();
                musicGain.gain.value = 0.9;
                musicSourceNode.connect(musicGain);
                musicGain.connect(audioCtx.destination);
                audioActive = true;
                return true;
            } catch (err) { return false; }
        }
        
        function startKeepAlive() { keepAliveInterval = setInterval(async () => { if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume(); if (isPlaying && musicPlayer.paused && audioActive) await musicPlayer.play().catch(e => console.log); }, 4000); }
        
        async function activateAudioAndPlay() {
            const ok = await initAudioContext();
            if (ok) {
                startKeepAlive();
                filteredPlaylist = musicas.filter(m => m.genre === currentGenre);
                currentIndex = 0;
                loadTrackUI(currentIndex);
                await playMusic();
                tapToStart.style.display = 'none';
            }
        }
        
        // Eventos
        genreButtons.forEach(btn => { btn.addEventListener('click', () => changeGenre(btn.dataset.genre)); });
        playBtn.addEventListener('click', () => { if(!audioActive) showNotification('⚠️ Clique em ATIVAR ÁUDIO!', 2000); else togglePlayPause(); resetHideTimer(); });
        prevBtn.addEventListener('click', () => { prevTrack(); resetHideTimer(); });
        nextBtn.addEventListener('click', () => { nextTrack(); resetHideTimer(); });
        shuffleBtn.addEventListener('click', () => { shuffle = !shuffle; showNotification(shuffle ? '🔀 Aleatório ON' : '➡️ Sequencial', 1500); });
        document.getElementById('progressBar').addEventListener('click', (e) => { const rect = e.currentTarget.getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; if(musicPlayer.duration) musicPlayer.currentTime = percent * musicPlayer.duration; });
        tapToStart.addEventListener('click', activateAudioAndPlay);
        
        menuButton.addEventListener('click', (e) => { e.stopPropagation(); menuPopup.classList.toggle('open'); });
        document.addEventListener('click', (e) => { if (!menuButton.contains(e.target) && !menuPopup.contains(e.target)) menuPopup.classList.remove('open'); });
        document.getElementById('shareMenuBtn').addEventListener('click', () => { if (navigator.share) navigator.share({ title: 'MUTV Playlist' }); else { navigator.clipboard.writeText(location.href); showNotification('Link copiado!'); } menuPopup.classList.remove('open'); });
        document.getElementById('feedbackMenuBtn').addEventListener('click', () => { document.getElementById('feedbackModal').classList.toggle('open'); menuPopup.classList.remove('open'); });
        
        // Botão ORÇAMENTO fixo
        ctaBtn.addEventListener('click', () => {
            window.open('https://wa.me/5512988461978?text=Olá,%20quero%20um%20orçamento!', '_blank');
        });
        
        // Vídeo (apenas um vídeo fixo)
        const vidEl = document.getElementById('mainVideo');
        if (vidEl) {
            vidEl.src = "Cazé_20260404_200357_0000.mp4";
            vidEl.load();
            vidEl.play().catch(e => console.log);
        }
        
        // Auto-hide barra inferior
        const bottomControls = document.getElementById('bottomControls');
        let hideTimeout;
        function showControls() { bottomControls.classList.remove('hide'); clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); }
        function resetHideTimer() { if (bottomControls.classList.contains('hide')) showControls(); else { clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); } }
        document.addEventListener('touchstart', resetHideTimer);
        document.addEventListener('click', resetHideTimer);
        showControls();
        
        // Feedback rating
        let currentRating = 0;
        document.querySelectorAll('#ratingStars .star').forEach(star => { star.addEventListener('click', () => { currentRating = parseInt(star.dataset.rating); document.querySelectorAll('#ratingStars .star').forEach((s,i) => { if(i < currentRating) { s.classList.add('fas','active'); s.classList.remove('far'); } else { s.classList.remove('fas','active'); s.classList.add('far'); } }); }); });
        document.getElementById('cancelFeedback').addEventListener('click', () => { document.getElementById('feedbackModal').classList.remove('open'); document.getElementById('feedbackText').value = ''; currentRating = 0; document.querySelectorAll('#ratingStars .star').forEach(s => { s.classList.remove('fas','active'); s.classList.add('far'); }); });
        document.getElementById('sendFeedback').addEventListener('click', () => { if(currentRating === 0) { showNotification('⭐ Selecione uma nota', 2000); return; } let msg = `🎵 MUTV Playlist\n⭐ Nota: ${'★'.repeat(currentRating)}${'☆'.repeat(5-currentRating)}\n`; if(document.getElementById('feedbackText').value.trim()) msg += `💬 ${document.getElementById('feedbackText').value.trim()}\n`; window.open(`https://wa.me/5512988461978?text=${encodeURIComponent(msg)}`, '_blank'); showNotification('✅ Feedback enviado', 1500); document.getElementById('feedbackModal').classList.remove('open'); document.getElementById('feedbackText').value = ''; currentRating = 0; document.querySelectorAll('#ratingStars .star').forEach(s => { s.classList.remove('fas','active'); s.classList.add('far'); }); });
        
        // INICIALIZAÇÃO
        window.addEventListener('load', () => {
            filteredPlaylist = musicas.filter(m => m.genre === currentGenre);
            currentIndex = 0;
            loadTrackUI(currentIndex);
            tapToStart.style.display = 'block';
            document.querySelector('.genre-btn[data-genre="sertanejo"]').classList.add('active');
        });
    </script>
</body>
</html>
