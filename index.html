<!DOCTYPE html>
<html lang="pt-br">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

        .app { width: 100%; height: 100vh; background: #000; position: relative; overflow: hidden; }
        
        /* Canvas de vídeo animado */
        #visualCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: linear-gradient(145deg, #0a0a2a, #1a1a3a);

        .controls-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        
        .notification-top {
            position: absolute;
            top: 12px;

            right: 12px;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            transition: opacity 0.3s;
            opacity: 0;

        .notification-top.show { opacity: 1; }
        .notification-top .message {

        .menu-popup {

        .genre-button {

            right: 15px;

        .genre-button:active { transform: scale(0.9); animation: none; }
        
        .genres-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 30px 30px 0 0;
            padding: 25px 20px 30px;

            transform: translateY(100%);

            box-shadow: 0 -5px 30px rgba(0,0,0,0.3);
        }
        .genres-modal.open { transform: translateY(0); }
        .genres-modal h3 {

            font-weight: bold;
            color: #1a1a2e;
        }
        .genres-modal h3 i { margin-right: 10px; color: #DD2475; }
        
        .genres-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);

            margin-bottom: 20px;
        }
        
        .genre-card {

        .genre-card:active { transform: scale(0.96); }
        .genre-card[data-genero="SERTANEJO"] { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
        .genre-card[data-genero="FORRÓ"] { background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); }
        .genre-card[data-genero="SAMBA"] { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); }
        .genre-card[data-genero="VGM"] { background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%); }
        .genre-card[data-genero="TODOS"] { background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); }
        .genre-card i { font-size: 2.8rem; display: block; margin-bottom: 12px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3)); }

        .close-genres:active { background: #DD2475; transform: scale(0.98); }
        
        .bottom-controls {

        .progress-area { margin-bottom: 8px; }

        .control-buttons { display: flex; align-items: center; justify-content: center; gap: 20px; }

        .rating { display: flex; gap: 6px; margin: 8px 0; justify-content: center; }
        .star { color: #555; font-size: 1.3rem; cursor: pointer; }
        .star.active, .star.fas { color: #ffd700; }
        .feedback-modal textarea { width: 100%; height: 60px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 8px; color: #fff; margin-bottom: 8px; resize: none; }
        .modal-btn { padding: 6px 12px; border-radius: 20px; cursor: pointer; background: #333; color: white; border: none; margin: 2px; }

        .whatsapp-float {

            height: 60px;
            background: #25D366;

            align-items: center;
            justify-content: center;
            z-index: 2002;

            color: white;

        }

        .custom-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 2003;
            border-left: 4px solid #25D366;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            font-weight: 500;
        }
        .custom-toast.show { opacity: 1; }
        
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        #splash.hidden { opacity: 0; pointer-events: none; }
        .splash-content { text-align: center; color: #fff; }
        .splash-content i { font-size: 3rem; color: #e63946; margin-bottom: 1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.6; transform: scale(1); } }
        
        #tap-to-start {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6600, #ff3300);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;

        }

        .genre-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: white;
            z-index: 31;
            pointer-events: none;
            border-left: 3px solid #e63946;
            font-weight: bold;
        }
        .audio-indicator {
            position: absolute;
            top: 12px;
            right: 70px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: #4ade80;
            z-index: 31;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .audio-indicator i { font-size: 0.6rem; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>

            <div class="genre-card" data-genero="SERTANEJO"><i class="fas fa-guitar"></i><span>SERTANEJO</span></div>
            <div class="genre-card" data-genero="FORRÓ"><i class="fas fa-drum"></i><span>FORRÓ</span></div>
            <div class="genre-card" data-genero="SAMBA"><i class="fas fa-drumstick-bite"></i><span>SAMBA</span></div>

        <textarea id="feedbackText" placeholder="Escreva sua sugestão..."></textarea>
        <div class="modal-buttons"><button class="modal-btn cancel" id="cancelFeedback">Cancelar</button><button class="modal-btn send" id="sendFeedback"><i class="fab fa-whatsapp"></i> Enviar</button></div>
    </div>
    
    <script>
        // ========== CONFIGURAÇÕES EDITÁVEIS ==========
        const WHATSAPP_NUMBER = "5512988461978";
        const WHATSAPP_MESSAGE = "Olá! Gostei da playlist Cazé! Quero mais informações.";
        const WHATSAPP_TOAST_MESSAGE = "💬 Enviando mensagem via WhatsApp...";
        
        // ========== PLAYLIST GERADA DINAMICAMENTE (Sons sintetizados) ==========
        // Cada música será um pequeno tom gerado por Web Audio (funciona sem arquivos)
        // Usaremos um gerador de tom simples para simular músicas de diferentes estilos
        const musicas = [
            { id: 1, title: "Saudade Boa", artist: "Jorge & Mateus", genero: "SERTANEJO", freq: 440, duration: 30 },
            { id: 2, title: "Infarto", artist: "Diego & Victor Hugo", genero: "SERTANEJO", freq: 450, duration: 32 },
            { id: 3, title: "Esqueci Você", artist: "Bruno & Marrone", genero: "SERTANEJO", freq: 430, duration: 28 },
            { id: 4, title: "Vaqueiro Apaixonado", artist: "Zé Vaqueiro", genero: "FORRÓ", freq: 380, duration: 35 },
            { id: 5, title: "Coração Partido", artist: "Luan Estilizado", genero: "FORRÓ", freq: 370, duration: 33 },
            { id: 6, title: "Piseiro da Hora", artist: "Tarcísio", genero: "FORRÓ", freq: 390, duration: 31 },
            { id: 7, title: "Pagode do Arrasta", artist: "Thiaguinho", genero: "SAMBA", freq: 310, duration: 29 },
            { id: 8, title: "Samba de Raiz", artist: "Grupo Menos É Mais", genero: "SAMBA", freq: 320, duration: 34 },
            { id: 9, title: "Pout-Pourri", artist: "Kiko no Pagode", genero: "SAMBA", freq: 315, duration: 36 },
            { id: 10, title: "Dona da Minha Cabeça", artist: "Geraldo Azevedo", genero: "VGM", freq: 520, duration: 27 },
            { id: 11, title: "Easy", artist: "Commodores", genero: "VGM", freq: 480, duration: 30 },
            { id: 12, title: "Mordida de Amor", artist: "SPC", genero: "SAMBA", freq: 325, duration: 31 },
            { id: 13, title: "Retrovisor", artist: "Gusttavo Lima", genero: "SERTANEJO", freq: 445, duration: 29 },
            { id: 14, title: "To Bebendo To Pagando", artist: "Mano Walter", genero: "FORRÓ", freq: 385, duration: 33 },
            { id: 15, title: "Catedral", artist: "Lauana Prado", genero: "SERTANEJO", freq: 435, duration: 28 }
        ];
        
        let currentAudioSource = null;
        let audioContext = null;
        let isPlaying = false;
        let currentIndex = 0;
        let shuffleMode = false;
        let filteredPlaylist = [...musicas];
        let currentDuration = 30;
        let currentInterval = null;
        let startTime = 0;
        let pausedAt = 0;
        let isBackgroundActive = false;
        let backgroundInterval = null;
        let adInterval = null;
        
        // Elementos DOM
        const playBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const trackArtist = document.getElementById('trackArtist');
        const splash = document.getElementById('splash');
        const tapToStart = document.getElementById('tap-to-start');
        const menuButton = document.getElementById('menuButton');
        const menuPopup = document.getElementById('menuPopup');
        const notificationTop = document.getElementById('notificationTop');
        const notificationMessage = document.getElementById('notificationMessage');
        const genreBadge = document.getElementById('genreBadge');
        const genreButton = document.getElementById('genreButton');
        const genresModal = document.getElementById('genresModal');
        const audioIndicator = document.getElementById('audioIndicator');
        const whatsappFloatBtn = document.getElementById('whatsappFloatBtn');
        const customToast = document.getElementById('customToast');
        const canvas = document.getElementById('visualCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== VÍDEO ANIMADO NO CANVAS ==========
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let hue = 0;
            function draw() {
                if (!ctx) return;
                hue = (hue + 0.5) % 360;
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, `hsl(${hue}, 80%, 20%)`);
                grad.addColorStop(1, `hsl(${(hue + 60) % 360}, 70%, 15%)`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Círculos pulsantes
                const time = Date.now() / 1000;
                for (let i = 0; i < 5; i++) {
                    const radius = 50 + (Math.sin(time * 1.5 + i) * 20);
                    ctx.beginPath();
                    ctx.arc(canvas.width/2 + Math.sin(time * 0.8 + i) * 100, canvas.height/2 + Math.cos(time * 0.6 + i) * 80, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue + i * 30}, 90%, 60%, 0.15)`;
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }
            draw();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        }
        initCanvas();
        
        // ========== GERADOR DE ÁUDIO (Web Audio) ==========
        async function initAudioContext() {
            if (audioContext) return audioContext;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        }
        
        function generateTone(frequency, durationSec, volume = 0.9) {
            return new Promise(async (resolve, reject) => {
                try {
                    const ctx = await initAudioContext();
                    if (currentAudioSource) {
                        try { currentAudioSource.stop(); } catch(e) {}
                    }
                    const gainNode = ctx.createGain();
                    gainNode.gain.value = volume;
                    gainNode.connect(ctx.destination);
                    
                    const oscillator = ctx.createOscillator();
                    oscillator.type = 'sine';
                    oscillator.frequency.value = frequency;
                    oscillator.connect(gainNode);
                    
                    currentAudioSource = oscillator;
                    oscillator.start();
                    
                    // Fade out suave no final
                    const fadeDuration = 1.0;
                    setTimeout(() => {
                        gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + fadeDuration);
                        setTimeout(() => {
                            try { oscillator.stop(); } catch(e) {}
                            resolve();
                        }, fadeDuration * 1000);
                    }, (durationSec - fadeDuration) * 1000);
                    
                } catch (err) { reject(err); }
            });
        }
        
        function stopCurrentAudio() {
            if (currentAudioSource) {
                try { currentAudioSource.stop(); } catch(e) {}
                currentAudioSource = null;
            }
        }
        
        async function playMusic() {
            if (!isBackgroundActive) {
                showNotification('⚠️ Clique em "ATIVAR ÁUDIO" primeiro!', 3000);
                return false;
            }
            if (currentInterval) clearInterval(currentInterval);
            stopCurrentAudio();
            
            const track = filteredPlaylist[currentIndex];
            currentDuration = track.duration;
            totalTimeEl.textContent = formatTime(currentDuration);
            currentTimeEl.textContent = "0:00";
            progressFill.style.width = "0%";
            
            startTime = Date.now();
            pausedAt = 0;
            isPlaying = true;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            
            // Inicia a reprodução do tom
            generateTone(track.freq, currentDuration, 0.9).then(() => {
                if (isPlaying) {
                    nextTrack();
                }
            }).catch(e => console.log("Erro no áudio:", e));
            
            // Atualiza barra de progresso
            currentInterval = setInterval(() => {
                if (isPlaying && !pausedAt) {
                    const elapsed = (Date.now() - startTime) / 1000;
                    const percent = Math.min(100, (elapsed / currentDuration) * 100);
                    progressFill.style.width = percent + '%';
                    currentTimeEl.textContent = formatTime(Math.min(elapsed, currentDuration));
                    if (elapsed >= currentDuration) {
                        clearInterval(currentInterval);
                    }
                }
            }, 200);
            
            // Media Session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title,
                    artist: track.artist,
                    album: `Cazé • ${track.genero}`
                });
            }
            return true;
        }
        
        function pauseMusic() {
            if (currentInterval) clearInterval(currentInterval);
            isPlaying = false;
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            stopCurrentAudio();
        }
        
        function togglePlayPause() {
            if (!isBackgroundActive) {
                showNotification('⚠️ Ative o áudio primeiro!', 2000);
                return;
            }
            if (isPlaying) pauseMusic();
            else playMusic();
        }
        
        function loadTrackUI(index) {
            const track = filteredPlaylist[index];
            trackArtist.textContent = `${track.title} - ${track.artist} [${track.genero}]`;
            updateGenreBadge(track.genero);
        }
        
        async function nextTrack() {
            if (currentInterval) clearInterval(currentInterval);
            stopCurrentAudio();
            let nextIndex = shuffleMode ? Math.floor(Math.random() * filteredPlaylist.length) : (currentIndex + 1) % filteredPlaylist.length;
            currentIndex = nextIndex;
            loadTrackUI(currentIndex);
            if (isPlaying) await playMusic();
        }
        
        async function prevTrack() {
            if (currentInterval) clearInterval(currentInterval);
            stopCurrentAudio();
            let prevIndex = shuffleMode ? Math.floor(Math.random() * filteredPlaylist.length) : (currentIndex - 1 + filteredPlaylist.length) % filteredPlaylist.length;
            currentIndex = prevIndex;
            loadTrackUI(currentIndex);
            if (isPlaying) await playMusic();
        }
        
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        
        function updateGenreBadge(genero) {
            let icon = "fa-guitar";
            if (genero === "FORRÓ") icon = "fa-drum";
            else if (genero === "SAMBA") icon = "fa-drumstick-bite";
            else if (genero === "VGM") icon = "fa-gamepad";
            genreBadge.innerHTML = `<i class="fas ${icon}"></i> ${genero}`;
        }
        
        function filterByGenre(genero) {
            if (genero === "TODOS") filteredPlaylist = [...musicas];
            else filteredPlaylist = musicas.filter(m => m.genero === genero);
            if (filteredPlaylist.length === 0) { showNotification("Nenhuma música", 2000); return; }
            currentIndex = 0;
            loadTrackUI(0);
            if (isPlaying) playMusic();
            showNotification(`🎵 ${genero}`, 2000);
            genresModal.classList.remove('open');
        }
        
        // ========== ÁUDIO DE FUNDO PARA TELA BLOQUEADA ==========
        async function ativarAudioBackground() {
            try {
                const ctx = await initAudioContext();
                const buffer = ctx.createBuffer(1, 1, 22050);
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                source.connect(gain);
                gain.connect(ctx.destination);
                source.start();
                isBackgroundActive = true;
                audioIndicator.innerHTML = '<i class="fas fa-circle"></i> Áudio Ativo';
                audioIndicator.style.color = '#4ade80';
                iniciarManutencao();
                if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
                return true;
            } catch (e) {
                console.error(e);
                return false;
            }
        }
        
        function iniciarManutencao() {
            if (backgroundInterval) clearInterval(backgroundInterval);
            backgroundInterval = setInterval(() => {
                if (isPlaying && audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }, 1000);
        }
        
        // ========== ANÚNCIO DE VOZ A CADA 30 MIN ==========
        function playVoiceAd() {
            if (!isBackgroundActive) return;
            const wasPlaying = isPlaying;
            if (wasPlaying) pauseMusic();
            const utterance = new SpeechSynthesisUtterance("Olá! Este é um anúncio especial da Cazé Playlist. Aproveite a melhor música com tela bloqueada! Curta e compartilhe.");
            utterance.volume = 0.9;
            utterance.rate = 1.0;
            utterance.lang = 'pt-BR';
            utterance.onend = () => {
                if (wasPlaying) playMusic();
            };
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
            showNotification("📢 Anúncio especial!", 3000);
        }
        
        function iniciarAnuncioPeriodico() {
            if (adInterval) clearInterval(adInterval);
            adInterval = setInterval(() => playVoiceAd(), 30 * 60 * 1000);
        }
        
        // ========== NOTIFICAÇÕES E TOAST ==========
        function showNotification(msg, duration = 3000) {
            notificationMessage.innerText = msg;
            notificationTop.classList.add('show');
            setTimeout(() => notificationTop.classList.remove('show'), duration);
        }
        
        function showCustomToast(msg, duration = 5000) {
            customToast.textContent = msg;
            customToast.classList.add('show');
            setTimeout(() => customToast.classList.remove('show'), duration);
        }
        
        // ========== EVENTOS ==========
        document.getElementById('progressBar').addEventListener('click', (e) => {
            if (!isPlaying) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const newTime = percent * currentDuration;
            startTime = Date.now() - (newTime * 1000);
        });
        
        playBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        shuffleBtn.addEventListener('click', () => { shuffleMode = !shuffleMode; showNotification(shuffleMode ? '🔀 Aleatório ON' : '➡️ Sequencial', 1500); });
        
        genreButton.addEventListener('click', () => genresModal.classList.add('open'));
        document.querySelectorAll('.genre-card').forEach(card => {
            card.addEventListener('click', () => filterByGenre(card.dataset.genero));
        });
        document.getElementById('closeGenresBtn').addEventListener('click', () => genresModal.classList.remove('open'));
        
        menuButton.addEventListener('click', (e) => { e.stopPropagation(); menuPopup.classList.toggle('open'); });
        document.addEventListener('click', (e) => { if (!menuButton.contains(e.target)) menuPopup.classList.remove('open'); });
        document.getElementById('fullscreenMenuBtn').addEventListener('click', () => { document.documentElement.requestFullscreen(); menuPopup.classList.remove('open'); });
        document.getElementById('shareMenuBtn').addEventListener('click', () => { navigator.share?.({ title: 'Cazé Playlist' }) || navigator.clipboard.writeText(location.href); showNotification('Link copiado!', 2000); menuPopup.classList.remove('open'); });
        document.getElementById('feedbackMenuBtn').addEventListener('click', () => { document.getElementById('feedbackModal').classList.toggle('open'); menuPopup.classList.remove('open'); });
        
        // Feedback
        let currentRating = 0;
        document.querySelectorAll('#ratingStars .star').forEach(star => {
            star.addEventListener('click', () => {
                currentRating = parseInt(star.dataset.rating);
                document.querySelectorAll('#ratingStars .star').forEach((s, i) => {
                    if (i < currentRating) { s.classList.add('fas', 'active'); s.classList.remove('far'); }
                    else { s.classList.remove('fas', 'active'); s.classList.add('far'); }
                });
            });
        });
        document.getElementById('cancelFeedback').addEventListener('click', () => {
            document.getElementById('feedbackModal').classList.remove('open');
            document.getElementById('feedbackText').value = '';
            currentRating = 0;
        });
        document.getElementById('sendFeedback').addEventListener('click', () => {
            if (currentRating === 0) { showNotification('⭐ Selecione uma nota', 2000); return; }
            let msg = `🎵 *Cazé Playlist*\n⭐ Nota: ${'★'.repeat(currentRating)}${'☆'.repeat(5 - currentRating)}\n`;
            if (document.getElementById('feedbackText').value.trim()) msg += `💬 ${document.getElementById('feedbackText').value.trim()}\n`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
            showNotification('✅ WhatsApp aberto!', 2000);
            document.getElementById('feedbackModal').classList.remove('open');
            document.getElementById('feedbackText').value = '';
            currentRating = 0;
            document.querySelectorAll('#ratingStars .star').forEach(s => { s.classList.remove('fas', 'active'); s.classList.add('far'); });
        });
        
        whatsappFloatBtn.addEventListener('click', () => {
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(WHATSAPP_MESSAGE)}`, '_blank');
            showCustomToast(WHATSAPP_TOAST_MESSAGE, 5000);
        });
        
        // Auto-hide controles
        const bottomControls = document.getElementById('bottomControls');
        let hideTimeout;
        function showControls() { bottomControls.classList.remove('hide'); clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); }
        function resetHideTimer() { if (bottomControls.classList.contains('hide')) showControls(); else { clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); } }
        document.addEventListener('touchstart', resetHideTimer);
        document.addEventListener('click', resetHideTimer);
        showControls();
        
        // Inicialização
        tapToStart.addEventListener('click', async () => {
            showNotification('🔊 Ativando áudio...', 2000);
            const ok = await ativarAudioBackground();
            if (ok) {
                await initAudioContext();
                audioContext.resume();
                filteredPlaylist = [...musicas];
                currentIndex = Math.floor(Math.random() * filteredPlaylist.length);
                loadTrackUI(currentIndex);
                await playMusic();
                tapToStart.style.display = 'none';
                splash.classList.add('hidden');
                setTimeout(() => splash.style.display = 'none', 500);
                iniciarAnuncioPeriodico();
                try { await document.documentElement.requestFullscreen(); } catch(e) {}
                showNotification('✅ Áudio ativado! Toque com tela bloqueada ✅', 3000);
            } else showNotification('❌ Falha. Tente novamente.', 3000);
        });
        
        window.addEventListener('load', () => {
            tapToStart.style.display = 'block';
        });
    </script>
</body>
</html>
