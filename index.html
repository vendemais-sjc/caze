        async function initAudioContext() {
            if (audioActive && audioCtx && audioCtx.state === 'running') return true;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                
                const sampleRate = audioCtx.sampleRate;
                const bufferLen = sampleRate * 4;
                const silentBuffer = audioCtx.createBuffer(1, bufferLen, sampleRate);
                const data = silentBuffer.getChannelData(0);
                for (let i = 0; i < bufferLen; i++) data[i] = 0;
                
                if (silentSourceNode) {

                silentSourceNode.buffer = silentBuffer;
                silentSourceNode.loop = true;
                silentSourceNode.connect(audioCtx.destination);
                silentSourceNode.start();

                musicSourceNode = audioCtx.createMediaElementSource(musicPlayer);

                adGain.connect(audioCtx.destination);
                
                audioActive = true;

        function setupSilentAudioWorkaround() {
            const silentAudio = document.getElementById('silentAudio');
            if (!silentAudio) return;
            const createSilentWAV = () => {
                const sampleRate = 44100, duration = 2;
                const numSamples = sampleRate * duration;
                const buffer = new ArrayBuffer(44 + numSamples * 2);
                const view = new DataView(buffer);
                function writeString(view, offset, str) {
                    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
                }
                writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + numSamples * 2, true);
                writeString(view, 8, 'WAVE');
                writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(view, 36, 'data');
                view.setUint32(40, numSamples * 2, true);
                let offset = 44;
                for (let i = 0; i < numSamples; i++) { view.setInt16(offset, 0, true); offset += 2; }
                return new Blob([buffer], { type: 'audio/wav' });
            };
            try {
                const silentBlob = createSilentWAV();
                const silentUrl = URL.createObjectURL(silentBlob);
                silentAudio.src = silentUrl;
                silentAudio.loop = true;
                silentAudio.volume = 0.001;
                silentAudio.play().catch(e => console.log('Silent audio workaround:', e));
            } catch (e) { console.log('Workaround error:', e); }

            musicPlayer.src = track.src;
            musicPlayer.load();
            
            updateGenreBadge(track.genero);
            
            return new Promise((resolve) => {
                musicPlayer.oncanplaythrough = async () => {
                    try {
                        if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                        await musicPlayer.play();
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        startTimer();
                        if (musicPlayer.duration) totalTimeEl.textContent = formatTime(musicPlayer.duration);
                        else musicPlayer.addEventListener('loadedmetadata', () => { totalTimeEl.textContent = formatTime(musicPlayer.duration); }, { once: true });
                        splash.classList.add('hidden'); setTimeout(() => splash.style.display = 'none', 500);
                        tapToStart.style.display = 'none';
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.metadata = new MediaMetadata({ title: track.title, artist: track.artist + " • " + track.genero, album: 'MUTV' });
                            navigator.mediaSession.setActionHandler('play', () => playMusic());
                            navigator.mediaSession.setActionHandler('pause', () => pauseMusic());
                            navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
                            navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
                        }
                        resolve(true);
                    } catch(e) { console.error(e); isPlaying = false; playBtn.innerHTML = '<i class="fas fa-play"></i>'; resolve(false); }
                };
                musicPlayer.onended = () => {
                    stopTimer();
                    let nextFiltered;
                    if (shuffle && filteredPlaylist.length > 1) {
                        do { nextFiltered = Math.floor(Math.random() * filteredPlaylist.length); } while (nextFiltered === currentIndex);
                    } else {
                        nextFiltered = (currentIndex + 1) % filteredPlaylist.length;
                    }
                    currentIndex = nextFiltered;
                    loadTrackUI(currentIndex);
                    setTimeout(async () => { if (!isAdPlaying) await playMusic(); }, 80);
                };
                musicPlayer.onerror = () => { showNotification(`⚠️ Erro: ${track.title}`, 3000); setTimeout(() => { if (!isAdPlaying) nextTrack(); }, 1000); resolve(false); };
                musicPlayer.ontimeupdate = () => { if (musicPlayer.duration) { progressFill.style.width = (musicPlayer.currentTime/musicPlayer.duration)*100+'%'; currentTimeEl.textContent = formatTime(musicPlayer.currentTime); } };
            });
        }
        
        function pauseMusic() { musicPlayer.pause(); isPlaying = false; playBtn.innerHTML = '<i class="fas fa-play"></i>'; stopTimer(); }
        function togglePlayPause() { isPlaying ? pauseMusic() : playMusic(); }
        function loadTrackUI(index) { if (index >= musicas.length) index = 0; if (index < 0) index = musicas.length-1; currentIndex = index; const t = musicas[currentIndex]; trackArtist.textContent = `${t.title} - ${t.artist} [${t.genero}]`; currentTimeEl.textContent = '0:00'; totalTimeEl.textContent = '0:00'; progressFill.style.width = '0%'; updateGenreBadge(t.genero); }
        
        async function nextTrack() { if (isAdPlaying) return; stopTimer(); let nextFiltered; if (shuffle && filteredPlaylist.length > 1) { do { nextFiltered = Math.floor(Math.random() * filteredPlaylist.length); } while (nextFiltered === currentIndex); } else { nextFiltered = (currentIndex + 1) % filteredPlaylist.length; } currentIndex = nextFiltered; loadTrackUI(currentIndex); if (isPlaying) await playMusic(); }
        async function prevTrack() { if (isAdPlaying) return; stopTimer(); let prevFiltered; if (shuffle && filteredPlaylist.length > 1) { do { prevFiltered = Math.floor(Math.random() * filteredPlaylist.length); } while (prevFiltered === currentIndex); } else { prevFiltered = (currentIndex - 1 + filteredPlaylist.length) % filteredPlaylist.length; } currentIndex = prevFiltered; loadTrackUI(currentIndex); if (isPlaying) await playMusic(); }
        
        // ==================== ADS ====================
        function finishAudioAd() { isAdPlaying = false; if(shouldResumeMusic) { musicPlayer.currentTime = musicPausedTime; playMusic(); shouldResumeMusic = false; } currentAdIndex++; }
        function playAudioAd() { if(!adsEnabled || isAdPlaying) return; if(isPlaying) { musicPausedTime = musicPlayer.currentTime; pauseMusic(); shouldResumeMusic = true; } else shouldResumeMusic = false; const ad = anunciosAudio[currentAdIndex % anunciosAudio.length]; adPlayer.src = ad.src; adPlayer.load(); isAdPlaying = true; adPlayer.play().catch(()=>finishAudioAd()); adPlayer.onended = finishAudioAd; adPlayer.onerror = finishAudioAd; }
        function startAdTimer() { setInterval(() => { if(adsEnabled && !isAdPlaying && isPlaying) playAudioAd(); }, adInterval * 60 * 1000); }
        
        // ==================== MENU ====================
        function toggleMenu() { menuPopup.classList.toggle('open'); }
        function closeMenu() { menuPopup.classList.remove('open'); }
        menuButton.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
        document.addEventListener('click', (e) => { if (!menuButton.contains(e.target) && !menuPopup.contains(e.target)) closeMenu(); });
        
        document.getElementById('fullscreenMenuBtn').addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            closeMenu();
        });
        document.getElementById('shareMenuBtn').addEventListener('click', () => {
            if (navigator.share) navigator.share({ title: 'MUTV Playlist', url: location.href });
            else { navigator.clipboard.writeText(location.href); showNotification('Link copiado!', 2000); }
            closeMenu();
        });
        document.getElementById('feedbackMenuBtn').addEventListener('click', () => {
            document.getElementById('feedbackModal').classList.toggle('open');
            closeMenu();
        });
        
        // ==================== EVENTOS ====================
        document.getElementById('progressBar').addEventListener('click', (e) => { if(isAdPlaying) return; const rect = e.currentTarget.getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; if(musicPlayer.duration) musicPlayer.currentTime = percent * musicPlayer.duration; resetHideTimer(); });
        playBtn.addEventListener('click', () => { if(!audioActive) showNotification('⚠️ Clique no botão "ATIVAR ÁUDIO" primeiro!', 3000); else togglePlayPause(); resetHideTimer(); });
        prevBtn.addEventListener('click', () => { prevTrack(); resetHideTimer(); });
        nextBtn.addEventListener('click', () => { nextTrack(); resetHideTimer(); });
        shuffleBtn.addEventListener('click', () => { shuffle = !shuffle; showNotification(shuffle ? '🔀 Aleatório ON' : '➡️ Sequencial', 1500); resetHideTimer(); });
        
        // Feedback
        let currentRating = 0;
        document.querySelectorAll('#ratingStars .star').forEach(star => { star.addEventListener('click', () => { currentRating = parseInt(star.dataset.rating); document.querySelectorAll('#ratingStars .star').forEach((s,i) => { if(i < currentRating) { s.classList.add('fas','active'); s.classList.remove('far'); } else { s.classList.remove('fas','active'); s.classList.add('far'); } }); }); });
        document.getElementById('cancelFeedback').addEventListener('click', () => { document.getElementById('feedbackModal').classList.remove('open'); document.getElementById('feedbackText').value = ''; currentRating = 0; document.querySelectorAll('#ratingStars .star').forEach(s => { s.classList.remove('fas','active'); s.classList.add('far'); }); });
        document.getElementById('sendFeedback').addEventListener('click', () => { if(currentRating === 0) { showNotification('⭐ Selecione uma nota', 2000); return; } let msg = `🎵 *MUTV Playlist*\n⭐ Nota: ${'★'.repeat(currentRating)}${'☆'.repeat(5-currentRating)}\n`; if(document.getElementById('feedbackText').value.trim()) msg += `💬 ${document.getElementById('feedbackText').value.trim()}\n`; window.open(`https://wa.me/5512988461978?text=${encodeURIComponent(msg)}`, '_blank'); showNotification('✅ WhatsApp aberto!', 2000); document.getElementById('feedbackModal').classList.remove('open'); document.getElementById('feedbackText').value = ''; currentRating = 0; document.querySelectorAll('#ratingStars .star').forEach(s => { s.classList.remove('fas','active'); s.classList.add('far'); }); });
        
        // ==================== RODÍZIO DE VÍDEOS ====================
        let currentVideoIndex = 0;
        const ctaBtn = document.getElementById('ctaButton');
        
        function updateVideoAndButton(index) {
            const video = videosList[index];
            const vidEl = document.getElementById('mainVideo');
            if (vidEl) {
                vidEl.pause();
                vidEl.src = video.src;
                vidEl.load();
                vidEl.play().catch(e => console.log("Vídeo autoplay bloqueado:", e));
                ctaBtn.innerHTML = `<i class="fas fa-shopping-cart"></i> ${video.botaoTexto}`;
                ctaBtn.onclick = () => window.open(video.link, '_blank');
            }
        }
        
        updateVideoAndButton(0);
        setInterval(() => {
            currentVideoIndex = (currentVideoIndex + 1) % videosList.length;
            updateVideoAndButton(currentVideoIndex);
        }, 20000);
        
        // Auto-hide da barra inferior
        const bottomControls = document.getElementById('bottomControls');
        let hideTimeout;
        function showControls() { bottomControls.classList.remove('hide'); clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); }
        function resetHideTimer() { if (bottomControls.classList.contains('hide')) { showControls(); } else { clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); } }
        document.addEventListener('touchstart', resetHideTimer);
        document.addEventListener('click', resetHideTimer);
        showControls();
        
        // Inicialização
        tapToStart.addEventListener('click', async (e) => {
            e.stopPropagation();
            const ok = await initAudioContext();
            if(ok) {
                startKeepAliveService();
                setupVisibilityHandler();
                setupSilentAudioWorkaround();
                const randomTrack = filteredPlaylist[Math.floor(Math.random()*filteredPlaylist.length)];
                currentIndex = musicas.findIndex(m => m.id === randomTrack.id);
                if(currentIndex === -1) currentIndex = 0;
                loadTrackUI(currentIndex);
                await playMusic();
                tapToStart.style.display = 'none';
                try { await document.documentElement.requestFullscreen(); } catch(err) { console.log('Fullscreen:', err); }
            } else showNotification('❌ Erro ao ativar áudio. Tente novamente.', 3000);
        });
        
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('radioTheme') || 'theme-red';
            document.body.className = savedTheme;
            const rand = filteredPlaylist[Math.floor(Math.random()*filteredPlaylist.length)];
            currentIndex = musicas.findIndex(m => m.id === rand.id);
            if(currentIndex === -1) currentIndex = 0;
            loadTrackUI(currentIndex);
            startAdTimer();
            tapToStart.style.display = 'block';
        });
    </script>
</body>
</html>
