<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MUTV Playlist • Toca com tela bloqueada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { min-height: 100vh; background-color: #000000; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        body.theme-red { --primary-color: #e63946; --primary-dark: #b71c1c; }
        body.theme-blue { --primary-color: #00a8ff; --primary-dark: #0077be; }
        body.theme-green { --primary-color: #00ff88; --primary-dark: #00cc6a; }
        body { --primary-color: #e63946; --primary-dark: #b71c1c; --text-primary: #ffffff; --text-secondary: #cccccc; }
        
        .app { width: 100%; height: 100vh; background: #000000; position: relative; overflow: hidden; }
        .fullscreen-video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .fullscreen-video-container video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .controls-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        
        /* SELETOR DE GÊNEROS */
        .genre-selector {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 5px 10px;
            display: flex;
            gap: 6px;
            z-index: 30;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.15);
            flex-wrap: wrap;
        }
        .genre-btn {
            background: rgba(0,0,0,0.4);
            border: none;
            color: rgba(255,255,255,0.8);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .genre-btn.active { background: var(--primary-color); color: #000; }
        .genre-btn:active { transform: scale(0.95); }
        
        /* BOTÃO INFORMAÇÕES DIREITA */
        .info-floating-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 31;
            pointer-events: auto;
        }
        .info-floating-btn:active { transform: scale(0.9); background: var(--primary-color); color: #000; }
        
        .info-popup {
            position: absolute;
            top: 60px;
            right: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 10px;
            z-index: 32;
            display: none;
            flex-direction: column;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
        }
        .info-popup.open { display: flex; }
        .info-popup button {
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .info-popup button:active { background: var(--primary-color); color: #000; }
        
        /* BOTÃO ATIVAR ÁUDIO QUASE INVISÍVEL */
        .audio-activate-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.2);
            color: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.55rem;
            cursor: pointer;
            z-index: 25;
            pointer-events: auto;
        }
        .audio-activate-btn:active { background: rgba(0,0,0,0.3); }
        
        /* BOTÃO CTA */
        .cta-button {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 25;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }
        .cta-button:active { background: var(--primary-color); color: #000; }
        
        .notification-top {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            pointer-events: none;
            transition: opacity 0.3s;
            opacity: 0;
        }
        .notification-top.show { opacity: 1; }
        .notification-top .message {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 0.8rem;
            color: #fff;
            border-left: 3px solid var(--primary-color);
        }
        
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.15);
            padding: 10px 16px;
            z-index: 20;
            pointer-events: auto;
            transition: transform 0.3s ease;
        }
        .bottom-controls.hide { transform: translateY(100%); pointer-events: none; }
        .track-info { text-align: center; margin-bottom: 8px; }
        .track-info p { font-size: 0.85rem; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .progress-area { margin-bottom: 8px; }
        .progress-time { display: flex; justify-content: space-between; font-size: 0.7rem; color: #ccc; margin-bottom: 4px; }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.3); cursor: pointer; border-radius: 3px; }
        .progress-fill { height: 100%; background: var(--primary-color); width: 0%; border-radius: 3px; }
        .control-buttons { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .control-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 1.2rem; width: 44px; height: 44px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .control-btn:active { transform: scale(0.9); background: var(--primary-color); color: #000; }
        .play-btn { font-size: 1.6rem; width: 54px; height: 54px; background: var(--primary-color); color: #000; border: none; }
        
        .feedback-modal {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 260px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--primary-color);
            border-radius: 16px;
            padding: 15px;
            z-index: 2001;
            display: none;
        }
        .feedback-modal.open { display: block; }
        .feedback-modal h3 { color: #fff; margin-bottom: 8px; font-size: 0.9rem; }
        .rating { display: flex; gap: 6px; margin: 8px 0; justify-content: center; }
        .star { color: #555; font-size: 1.2rem; cursor: pointer; }
        .star.active, .star.fas { color: #ffd700; }
        .feedback-modal textarea { width: 100%; height: 60px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 8px; color: #fff; margin-bottom: 8px; resize: none; }
        .modal-btn { padding: 6px 12px; border-radius: 20px; cursor: pointer; background: #333; color: white; border: none; margin: 2px; }
        .modal-btn.send { background: #25D366; color: #000; font-weight: bold; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        #splash.hidden { opacity: 0; pointer-events: none; }
        .splash-content { text-align: center; color: #fff; }
        .splash-content i { font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.6; transform: scale(1); } }
        
        #tap-to-start {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 10000;
            cursor: pointer;
            display: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        @media (max-width: 480px) {
            .genre-btn { padding: 4px 8px; font-size: 0.6rem; }
            .control-btn { width: 40px; height: 40px; }
            .play-btn { width: 48px; height: 48px; font-size: 1.4rem; }
        }
    </style>
</head>
<body class="theme-red">
    <div id="splash"><div class="splash-content"><i class="fas fa-headphones-alt"></i><h1>MUTV Playlist</h1><p>Carregando...</p></div></div>
    <div id="tap-to-start"><i class="fas fa-play-circle"></i> ATIVAR ÁUDIO</div>
    
    <div class="app">
        <div class="fullscreen-video-container">
            <video id="mainVideo" autoplay loop muted playsinline>
                <!-- VÍDEO DE EXEMPLO FUNCIONAL (do Google) -->
                <source src="Cazé_20260404_200357_0000.mp4" type="video/mp4">
            </video>
        </div>
        
        <button class="audio-activate-btn" id="compactAudioBtn"><i class="fas fa-volume-up"></i> ativar</button>
        
        <div class="genre-selector" id="genreSelector">
            <button class="genre-btn active" data-genre="all">🎵 TODAS</button>
            <button class="genre-btn" data-genre="sertanejo">🎸 SERTANEJO</button>
            <button class="genre-btn" data-genre="forro">🪘 FORRÓ</button>

        </div>
        
        <button class="info-floating-btn" id="infoFloatingBtn"><i class="fas fa-info-circle"></i></button>
        
        <div class="info-popup" id="infoPopup">
            <button id="fullscreenInfoBtn"><i class="fas fa-expand"></i> Tela cheia</button>
            <button id="shareInfoBtn"><i class="fas fa-share-alt"></i> Compartilhar</button>
            <button id="feedbackInfoBtn"><i class="fab fa-whatsapp"></i> Feedback</button>
        </div>
        
        <button class="cta-button" id="ctaButton"><i class="fas fa-info-circle"></i> <span id="ctaText">SAIBA MAIS</span></button>
        
        <div id="notificationTop" class="notification-top"><div class="message" id="notificationMessage"></div></div>
        
        <div class="controls-overlay">
            <div class="bottom-controls" id="bottomControls">
                <div class="track-info"><p id="trackArtist">🎵 Selecione um gênero</p></div>
                <div class="progress-area">
                    <div class="progress-time"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
                    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <div class="control-buttons">
                    <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                    <button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="shuffleBtn"><i class="fas fa-random"></i></button>
                    <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>
        </div>
    </div>
    
    <audio id="musicPlayer" preload="auto"></audio>
    <audio id="silentAudio" loop style="display: none;"></audio>
    
    <div class="feedback-modal" id="feedbackModal">
        <h3>Sua opinião</h3>
        <div class="rating" id="ratingStars">
            <i class="far fa-star star" data-rating="1"></i><i class="far fa-star star" data-rating="2"></i>
            <i class="far fa-star star" data-rating="3"></i><i class="far fa-star star" data-rating="4"></i>
            <i class="far fa-star star" data-rating="5"></i>
        </div>
        <textarea id="feedbackText" placeholder="Escreva sua sugestão..."></textarea>
        <div class="modal-buttons">
            <button class="modal-btn cancel" id="cancelFeedback">Cancelar</button>
            <button class="modal-btn send" id="sendFeedback"><i class="fab fa-whatsapp"></i> Enviar</button>
        </div>
    </div>

    <script>
        // ==================== PLAYLIST COM MÚSICAS FUNCIONAIS (ONLINE) ====================
        const musicas = [
            // SERTANEJO
            { id: 1, title: "Evidências", artist: "Chitãozinho & Xororó", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", genre: "sertanejo" },
            { id: 2, title: "Fio de Cabelo", artist: "Chitãozinho & Xororó", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", genre: "sertanejo" },
            { id: 3, title: "Pássaro de Fogo", artist: "Paula Fernandes", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", genre: "sertanejo" },
            // FORRÓ
            { id: 4, title: "Xote da Alegria", artist: "Falamansa", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", genre: "forro" },
            { id: 5, title: "Vem Morena", artist: "Aviões do Forró", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", genre: "forro" },
            { id: 6, title: "Coração Forrozeiro", artist: "Wesley Safadão", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", genre: "forro" },
            // SAMBA
            { id: 7, title: "Canto das Três Raças", artist: "Clara Nunes", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3", genre: "samba" },
            { id: 8, title: "Aquarela Brasileira", artist: "Martinho da Vila", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", genre: "samba" },
            { id: 9, title: "O Show Tem Que Continuar", artist: "Zeca Pagodinho", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3", genre: "samba" },
            // VGM (Video Game Music)
            { id: 10, title: "Theme of Laura", artist: "Silent Hill 2", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3", genre: "vgm" },
            { id: 11, title: "Aerith's Theme", artist: "Final Fantasy VII", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", genre: "vgm" },
            { id: 12, title: "Zelda's Lullaby", artist: "The Legend of Zelda", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", genre: "vgm" }
        ];
        
        // Vídeos CTA
        const videosList = [
            { src: "Cazé_20260404_200357_0000.mp4", nome: "Destaque", link: "https://wa.me/5512988461978", botaoTexto: "📞 INFORMAÇÕES" },
            { src: "play.mp4", nome: "MUTV", link: "https://wa.me/5512988461978", botaoTexto: "💰 ORÇAMENTO" },
            { src: "play.mp4", nome: "Promoção", link: "https://wa.me/5512988461978", botaoTexto: "🎁 SAIBA MAIS" }
        ];
        
        // DOM elements
        const musicPlayer = document.getElementById('musicPlayer');
        const playBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const trackArtist = document.getElementById('trackArtist');
        const splash = document.getElementById('splash');
        const tapToStart = document.getElementById('tap-to-start');
        const compactAudioBtn = document.getElementById('compactAudioBtn');
        const infoFloatingBtn = document.getElementById('infoFloatingBtn');
        const infoPopup = document.getElementById('infoPopup');
        
        let currentIndex = 0, isPlaying = false, shuffle = false;
        let timerInterval = null;
        let filteredPlaylist = [...musicas];
        let currentGenre = "all";
        
        function showNotification(msg) {
            const notif = document.getElementById('notificationMessage');
            const container = document.getElementById('notificationTop');
            notif.innerText = msg;
            container.classList.add('show');
            setTimeout(() => container.classList.remove('show'), 3000);
        }
        
        // Filtro por gênero
        function filterByGenre(genre) {
            currentGenre = genre;
            if (genre === "all") {
                filteredPlaylist = [...musicas];
            } else {
                filteredPlaylist = musicas.filter(m => m.genre === genre);
            }
            if (filteredPlaylist.length === 0) {
                showNotification(`⚠️ Nenhuma música para este gênero`);
                filteredPlaylist = [...musicas];
            }
            currentIndex = 0;
            loadTrackUI(0);
            if (isPlaying) playMusic();
            
            document.querySelectorAll('.genre-btn').forEach(btn => {
                if (btn.dataset.genre === genre) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isPlaying && musicPlayer.duration && !musicPlayer.paused) {
                    const percent = (musicPlayer.currentTime / musicPlayer.duration) * 100;
                    progressFill.style.width = percent + '%';
                    currentTimeEl.textContent = formatTime(musicPlayer.currentTime);
                }
            }, 200);
        }
        
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); }
        
        function loadTrackUI(index) {
            if (index >= filteredPlaylist.length) index = 0;
            if (index < 0) index = filteredPlaylist.length - 1;
            currentIndex = index;
            const track = filteredPlaylist[currentIndex];
            if (track) trackArtist.textContent = `${track.title} - ${track.artist}`;
            currentTimeEl.textContent = '0:00';
            totalTimeEl.textContent = '0:00';
            progressFill.style.width = '0%';
        }
        
        async function playMusic() {
            if (filteredPlaylist.length === 0) return;
            const track = filteredPlaylist[currentIndex];
            musicPlayer.src = track.src;
            musicPlayer.load();
            
            musicPlayer.oncanplaythrough = async () => {
                try {
                    await musicPlayer.play();
                    isPlaying = true;
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    startTimer();
                    if (musicPlayer.duration) totalTimeEl.textContent = formatTime(musicPlayer.duration);
                    splash.classList.add('hidden');
                    tapToStart.style.display = 'none';
                } catch(e) { console.log(e); }
            };
            musicPlayer.onended = () => {
                stopTimer();
                let next = shuffle ? Math.floor(Math.random() * filteredPlaylist.length) : (currentIndex + 1) % filteredPlaylist.length;
                currentIndex = next;
                loadTrackUI(currentIndex);
                playMusic();
            };
            musicPlayer.ontimeupdate = () => {
                if (musicPlayer.duration) {
                    progressFill.style.width = (musicPlayer.currentTime / musicPlayer.duration) * 100 + '%';
                    currentTimeEl.textContent = formatTime(musicPlayer.currentTime);
                }
            };
        }
        
        function pauseMusic() {
            musicPlayer.pause();
            isPlaying = false;
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            stopTimer();
        }
        
        function togglePlayPause() { isPlaying ? pauseMusic() : playMusic(); }
        
        function nextTrack() {
            if (shuffle && filteredPlaylist.length > 1) {
                let newIdx;
                do { newIdx = Math.floor(Math.random() * filteredPlaylist.length); } while (newIdx === currentIndex);
                currentIndex = newIdx;
            } else {
                currentIndex = (currentIndex + 1) % filteredPlaylist.length;
            }
            loadTrackUI(currentIndex);
            if (isPlaying) playMusic();
        }
        
        function prevTrack() {
            if (shuffle && filteredPlaylist.length > 1) {
                let newIdx;
                do { newIdx = Math.floor(Math.random() * filteredPlaylist.length); } while (newIdx === currentIndex);
                currentIndex = newIdx;
            } else {
                currentIndex = (currentIndex - 1 + filteredPlaylist.length) % filteredPlaylist.length;
            }
            loadTrackUI(currentIndex);
            if (isPlaying) playMusic();
        }
        
        // Eventos
        document.getElementById('progressBar').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (musicPlayer.duration) musicPlayer.currentTime = percent * musicPlayer.duration;
        });
        
        playBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        shuffleBtn.addEventListener('click', () => { shuffle = !shuffle; showNotification(shuffle ? '🔀 Aleatório ON' : '➡️ Sequencial'); });
        
        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.addEventListener('click', () => filterByGenre(btn.dataset.genre));
        });
        
        // Menu flutuante
        infoFloatingBtn.addEventListener('click', (e) => { e.stopPropagation(); infoPopup.classList.toggle('open'); });
        document.addEventListener('click', (e) => { if (!infoFloatingBtn.contains(e.target) && !infoPopup.contains(e.target)) infoPopup.classList.remove('open'); });
        document.getElementById('fullscreenInfoBtn').addEventListener('click', () => { document.documentElement.requestFullscreen(); infoPopup.classList.remove('open'); });
        document.getElementById('shareInfoBtn').addEventListener('click', () => { navigator.clipboard.writeText(location.href); showNotification('Link copiado!'); infoPopup.classList.remove('open'); });
        document.getElementById('feedbackInfoBtn').addEventListener('click', () => { document.getElementById('feedbackModal').classList.toggle('open'); infoPopup.classList.remove('open'); });
        
        // Feedback
        let currentRating = 0;
        document.querySelectorAll('#ratingStars .star').forEach(star => {
            star.addEventListener('click', () => {
                currentRating = parseInt(star.dataset.rating);
                document.querySelectorAll('#ratingStars .star').forEach((s, i) => {
                    if (i < currentRating) { s.classList.add('fas', 'active'); s.classList.remove('far'); }
                    else { s.classList.remove('fas', 'active'); s.classList.add('far'); }
                });
            });
        });
        document.getElementById('cancelFeedback').addEventListener('click', () => {
            document.getElementById('feedbackModal').classList.remove('open');
            document.getElementById('feedbackText').value = '';
            currentRating = 0;
        });
        document.getElementById('sendFeedback').addEventListener('click', () => {
            if (currentRating === 0) { showNotification('⭐ Selecione uma nota'); return; }
            let msg = `🎵 MUTV Playlist\n⭐ Nota: ${'★'.repeat(currentRating)}${'☆'.repeat(5 - currentRating)}\n`;
            if (document.getElementById('feedbackText').value.trim()) msg += `💬 ${document.getElementById('feedbackText').value.trim()}`;
            window.open(`https://wa.me/5512988461978?text=${encodeURIComponent(msg)}`, '_blank');
            showNotification('✅ WhatsApp aberto!');
            document.getElementById('feedbackModal').classList.remove('open');
        });
        
        // Vídeos
        let currentVideoIndex = 0;
        const ctaBtn = document.getElementById('ctaButton');
        const ctaSpan = document.getElementById('ctaText');
        const mainVideo = document.getElementById('mainVideo');
        
        function updateVideoAndButton(index) {
            const video = videosList[index];
            mainVideo.src = video.src;
            mainVideo.load();
            mainVideo.play().catch(e => console.log);
            ctaSpan.innerText = video.botaoTexto;
            ctaBtn.onclick = () => window.open(video.link, '_blank');
        }
        updateVideoAndButton(0);
        setInterval(() => { currentVideoIndex = (currentVideoIndex + 1) % videosList.length; updateVideoAndButton(currentVideoIndex); }, 20000);
        
        // Auto-hide
        const bottomControls = document.getElementById('bottomControls');
        let hideTimeout;
        function showControls() { bottomControls.classList.remove('hide'); clearTimeout(hideTimeout); hideTimeout = setTimeout(() => bottomControls.classList.add('hide'), 3000); }
        document.addEventListener('touchstart', showControls);
        document.addEventListener('click', showControls);
        showControls();
        
        // Ativação
        async function activateAudio() {
            try {
                await musicPlayer.play();
                musicPlayer.pause();
                showNotification('✅ Áudio ativado! Clique em play para começar');
                tapToStart.style.display = 'none';
                const randomTrack = filteredPlaylist[Math.floor(Math.random() * filteredPlaylist.length)];
                currentIndex = filteredPlaylist.findIndex(m => m.id === randomTrack.id);
                loadTrackUI(currentIndex);
            } catch(e) { showNotification('⚠️ Toque novamente para ativar'); }
        }
        
        compactAudioBtn.addEventListener('click', activateAudio);
        tapToStart.addEventListener('click', activateAudio);
        
        window.addEventListener('load', () => {
            filterByGenre("all");
            tapToStart.style.display = 'block';
            setTimeout(() => splash.classList.add('hidden'), 1500);
        });
    </script>
</body>
</html>
